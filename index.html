let _audioCtx = null;
function getCtx() {
  if (!_audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) _audioCtx = new AC();
  }
  return _audioCtx;
}
function tone(freq, dur = 0.12, type = "sine", vol = 0.18, when = 0) {
  const ctx = getCtx();
  if (!ctx) return;
  const t0 = ctx.currentTime + when;
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  osc.connect(g).connect(ctx.destination);
  osc.start(t0);
  osc.stop(t0 + dur + 0.05);
}

/* ---------- Розкладка кросворда (генерується на льоту) ---------- */
function buildLayout(words) {
  const sorted = [...words].sort((a, b) => b.length - a.length);
  const cells = new Map(); // "r,c" -> letter
  const placed = [];
  const key = (r, c) => r + "," + c;

  function canPlace(word, r, c, dir) {
    for (let i = 0; i < word.length; i++) {
      const rr = dir === "h" ? r : r + i;
      const cc = dir === "h" ? c + i : c;
      const existing = cells.get(key(rr, cc));
      if (existing && existing !== word[i]) return false;
      if (!existing) {
        // сусідні клітинки поперек не мають торкатися чужих слів
        const side = dir === "h" ? [[rr - 1, cc], [rr + 1, cc]] : [[rr, cc - 1], [rr, cc + 1]];
        for (const [sr, sc] of side) if (cells.has(key(sr, sc))) return false;
      }
    }
    // клітинки перед і після слова мають бути порожні
    const before = dir === "h" ? [r, c - 1] : [r - 1, c];
    const after = dir === "h" ? [r, c + word.length] : [r + word.length, c];
    if (cells.has(key(...before)) || cells.has(key(...after))) return false;
    return true;
  }
  function doPlace(word, r, c, dir) {
    const coords = [];
    for (let i = 0; i < word.length; i++) {
      const rr = dir === "h" ? r : r + i;
      const cc = dir === "h" ? c + i : c;
      cells.set(key(rr, cc), word[i]);
      coords.push([rr, cc]);
    }
    placed.push({ word, coords });
  }

  doPlace(sorted[0], 0, 0, "h");
  let fallbackRow = 2;
  for (let w = 1; w < sorted.length; w++) {
    const word = sorted[w];
    let done = false;
    outer:
    for (const p of placed) {
      for (let pi = 0; pi < p.word.length; pi++) {
        for (let wi = 0; wi < word.length; wi++) {
          if (p.word[pi] !== word[wi]) continue;
          const [ar, ac] = p.coords[pi];
          // спробувати вертикально та горизонтально
          for (const dir of ["v", "h"]) {
            const r = dir === "v" ? ar - wi : ar;
            const c = dir === "v" ? ac : ac - wi;
            if (canPlace(word, r, c, dir)) {
              doPlace(word, r, c, dir);
              done = true;
              break outer;
            }
          }
        }
      }
    }
    if (!done) { doPlace(word, fallbackRow, 0, "h"); fallbackRow += 2; }
  }
  // нормалізація координат
  let minR = Infinity, minC = Infinity, maxR = -Infinity, maxC = -Infinity;
  for (const k of cells.keys()) {
    const [r, c] = k.split(",").map(Number);
    minR = Math.min(minR, r); minC = Math.min(minC, c);
    maxR = Math.max(maxR, r); maxC = Math.max(maxC, c);
  }
  const norm = placed.map((p) => ({
    word: p.word,
    coords: p.coords.map(([r, c]) => [r - minR, c - minC]),
  }));
  return { placed: norm, rows: maxR - minR + 1, cols: maxC - minC + 1 };
}

/* ---------- Головний компонент ---------- */
function App() {
  const [screen, setScreen] = useState("menu"); // menu | game | settings
  const [levelIdx, setLevelIdx] = useState(0);
  const [coins, setCoins] = useState(50);
  const [soundOn, setSoundOn] = useState(true);
  const [maxUnlocked, setMaxUnlocked] = useState(0);

  const play = useCallback((name, arg) => { if (soundOn) SFX[name](arg); }, [soundOn]);

  return (
    <div style={S.app}>
      <Stars />
      {screen === "menu" && (
        <Menu
          onPlay={() => setScreen("game")}
          onSettings={() => setScreen("settings")}
          levelIdx={levelIdx}
          setLevelIdx={setLevelIdx}
          maxUnlocked={maxUnlocked}
          coins={coins}
        />
      )}
      {screen === "settings" && (
        <Settings soundOn={soundOn} setSoundOn={setSoundOn} onBack={() => setScreen("menu")} />
      )}
      {screen === "game" && (
        <Game
          key={levelIdx}
          level={LEVELS[levelIdx]}
          levelIdx={levelIdx}
          coins={coins}
          setCoins={setCoins}
          play={play}
          onExit={() => setScreen("menu")}
          onNext={() => {
            const next = Math.min(levelIdx + 1, LEVELS.length - 1);
            setMaxUnlocked((m) => Math.max(m, next));
            if (levelIdx < LEVELS.length - 1) setLevelIdx(levelIdx + 1);
            else setScreen("menu");
          }}
        />
      )}
    </div>
  );
}

/* ---------- Зоряне тло ---------- */
function Stars() {
  const stars = useMemo(
    () => Array.from({ length: 60 }, (_, i) => ({
      x: Math.random() * 100, y: Math.random() * 100,
      s: Math.random() * 2 + 1, d: Math.random() * 4 + 2, key: i,
    })), []
  );
  return (
    <div style={S.starsWrap} aria-hidden>
      {stars.map((st) => (
        <div key={st.key} style={{
          position: "absolute", left: st.x + "%", top: st.y + "%",
          width: st.s, height: st.s, borderRadius: "50%",
          background: "#f5efe0", opacity: 0.5,
          animation: `tw ${st.d}s ease-in-out infinite`,
        }} />
      ))}
      <style>{`@keyframes tw {0%,100%{opacity:.15}50%{opacity:.7}}
        @keyframes pop {0%{transform:scale(.3);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
        @keyframes shake {0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
        @media (prefers-reduced-motion: reduce){*{animation:none!important}}`}</style>
    </div>
  );
}

/* ---------- Меню ---------- */
function Menu({ onPlay, onSettings, levelIdx, setLevelIdx, maxUnlocked, coins }) {

}

/* ---------- Налаштування ---------- */
function Settings({ soundOn, setSoundOn, onBack }) {
  return (
    <div style={S.screen}>
      <h2 style={S.h2}>Налаштування</h2>
      <div style={S.settingRow}>

      </div>

      <button style={S.bigBtn} onClick={onBack}>← Назад</button>
      <div style={{ height: 24 }} />

}

/* ---------- Гра ---------- */
const HINT_COST = 15;

function Game({ level, levelIdx, coins, setCoins, play, onExit, onNext }) {
  const layout = useMemo(() => buildLayout(level.words), [level]);
  const letters = useMemo(() => level.main.split(""), [level]);
  const [found, setFound] = useState([]);          // знайдені цільові слова
  const [bonusFound, setBonusFound] = useState([]); // знайдені бонусні
  const [revealed, setRevealed] = useState([]);     // підказки: "r,c"
  const [sel, setSel] = useState([]);               // індекси вибраних літер
  const [pointer, setPointer] = useState(null);
  const [flash, setFlash] = useState(null);         // {type,text}
  const [done, setDone] = useState(false);
  const wheelRef = useRef(null);

  const complete = found.length === level.words.length;
  useEffect(() => {
    if (complete && !done) {
      setDone(true);
      play("level");
      setCoins((c) => c + 20);
    }
  }, [complete, done, play, setCoins]);

  /* --- геометрія колеса --- */
  const R = 118, LR = 86;
  const letterPos = letters.map((_, i) => {
    const a = (i / letters.length) * Math.PI * 2 - Math.PI / 2;
    return { x: R + Math.cos(a) * LR, y: R + Math.sin(a) * LR };
  });

  const localPoint = (e) => {
    const rect = wheelRef.current.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  };
  const hitLetter = (p) => {
    for (let i = 0; i < letterPos.length; i++) {
      const dx = p.x - letterPos[i].x, dy = p.y - letterPos[i].y;
      if (dx * dx + dy * dy < 30 * 30) return i;
    }
    return -1;
  };

  const onDown = (e) => {
    if (done) return;
    e.currentTarget.setPointerCapture(e.pointerId);
    const p = localPoint(e);
    const i = hitLetter(p);
    if (i >= 0) { setSel([i]); play("pick", 0); }
    setPointer(p);
  };
  const onMove = (e) => {
    if (done || sel.length === 0) return;
    const p = localPoint(e);
    setPointer(p);
    const i = hitLetter(p);
    if (i >= 0) {
      const idx = sel.indexOf(i);
      if (idx === -1) { setSel((s) => [...s, i]); play("pick", sel.length); }
      else if (idx === sel.length - 2) setSel((s) => s.slice(0, -1)); // відкат
    }
  };
  const onUp = () => {
    if (sel.length === 0) return;
    const word = sel.map((i) => letters[i]).join("");
    submit(word);
    setSel([]);
    setPointer(null);
  };

  function submit(word) {
    if (word.length < 2) return;
    if (found.includes(word) || bonusFound.includes(word)) {
      play("dup"); pulse("dup", "Уже знайдено");
      return;
    }
    if (level.words.includes(word)) {
      setFound((f) => [...f, word]);
      setCoins((c) => c + word.length);
      play("word"); pulse("ok", `+${word.length} 🪙`);
    } else if (level.bonus.includes(word)) {
      setBonusFound((b) => [...b, word]);
      setCoins((c) => c + 5);
      play("bonus"); pulse("bonus", `Бонус! +5 🪙`);
    } else {
      play("fail"); pulse("fail", "Немає такого слова");
    }
  }

  function pulse(type, text) {
    setFlash({ type, text });
    setTimeout(() => setFlash(null), 900);
  }

  function useHint() {
    if (coins < HINT_COST) { pulse("fail", `Треба ${HINT_COST} ${monet(HINT_COST)}`); return; }
    const hidden = [];
    for (const p of layout.placed) {
      if (found.includes(p.word)) continue;
      p.coords.forEach(([r, c], i) => {
        const k = r + "," + c;
        if (!revealed.includes(k) && !isCellOpen(r, c)) hidden.push(k);
      });
    }
    const uniq = [...new Set(hidden)];
    if (uniq.length === 0) return;
    const pick = uniq[Math.floor(Math.random() * uniq.length)];
    setRevealed((rv) => [...rv, pick]);
    setCoins((c) => c - HINT_COST);
    play("hint");
  }

  const isCellOpen = (r, c) =>
    layout.placed.some((p) => found.includes(p.word) && p.coords.some(([rr, cc]) => rr === r && cc === c));

  /* --- клітинки кросворда --- */
  const cellMap = useMemo(() => {
    const m = new Map();
    for (const p of layout.placed)
      p.coords.forEach(([r, c], i) => m.set(r + "," + c, p.word[i]));
    return m;
  }, [layout]);

  const gridW = Math.min(340, window.innerWidth - 32);
  const cellSize = Math.min(46, Math.floor(gridW / layout.cols) - 4);

  return (
    <div style={S.screen}>
      {/* верхня панель */}
      <div style={S.topBar}>
        <button style={S.iconBtn} onClick={onExit}>←</button>
        <div style={S.levelTitle}>Рівень {levelIdx + 1}</div>
        <div style={S.coinsSmall}>🪙 {coins}</div>
      </div>

      {/* кросворд */}
      <div style={{ ...S.grid, gridTemplateColumns: `repeat(${layout.cols}, ${cellSize}px)` }}>
        {Array.from({ length: layout.rows }).map((_, r) =>
          Array.from({ length: layout.cols }).map((_, c) => {
            const k = r + "," + c;
            const letter = cellMap.get(k);
            if (!letter) return <div key={k} style={{ width: cellSize, height: cellSize }} />;
            const open = isCellOpen(r, c) || revealed.includes(k);
            return (
              <div key={k} style={{
                width: cellSize, height: cellSize,
                ...S.cell,
                ...(open ? S.cellOpen : {}),
                fontSize: cellSize * 0.5,
                animation: open ? "pop .35s ease" : "none",
              }}>
                {open ? letter : ""}
              </div>
            );
          })
        )}
      </div>

      {/* статус / бонуси */}
      <div style={S.statusRow}>
        <span>{found.length}/{level.words.length} {sliv(level.words.length)}</span>
        {level.bonus.length > 0 && (
          <span style={{ opacity: 0.7 }}>✦ бонусні: {bonusFound.length}/{level.bonus.length}</span>
        )}
      </div>

      {/* спалах-повідомлення */}
      <div style={{ height: 34 }}>
        {flash && (
          <div style={{
            ...S.flash,
            color: flash.type === "fail" ? "#ff7b7b" : flash.type === "bonus" ? "#9ae6ff" : "#6fcf97",
            animation: flash.type === "fail" ? "shake .3s ease" : "pop .3s ease",
          }}>
            {flash.text}
          </div>
        )}
        {!flash && sel.length > 0 && (
          <div style={{ ...S.flash, color: "#f4c542" }}>
            {sel.map((i) => letters[i]).join("")}
          </div>
        )}
      </div>

      {/* колесо літер */}
      <div
        ref={wheelRef}
        style={S.wheel}
        onPointerDown={onDown}
        onPointerMove={onMove}
        onPointerUp={onUp}
        onPointerCancel={onUp}
      >
        <svg width={R * 2} height={R * 2} style={{ position: "absolute", inset: 0, pointerEvents: "none" }}>
          {sel.map((li, i) => {
            if (i === 0) return null;
            const a = letterPos[sel[i - 1]], b = letterPos[li];
            return <line key={i} x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke="#f4c542" strokeWidth="3" strokeLinecap="round" opacity="0.9" />;
          })}
          {sel.length > 0 && pointer && (
            <line
              x1={letterPos[sel[sel.length - 1]].x} y1={letterPos[sel[sel.length - 1]].y}
              x2={pointer.x} y2={pointer.y}
              stroke="#f4c542" strokeWidth="2.5" strokeDasharray="4 5" opacity="0.6"
            />
          )}
        </svg>
        {letters.map((L, i) => (
          <div key={i} style={{
            ...S.wheelLetter,
            left: letterPos[i].x - 27, top: letterPos[i].y - 27,
            ...(sel.includes(i) ? S.wheelLetterSel : {}),
          }}>
            {L}
          </div>
        ))}
      </div>

      {/* нижня панель */}
      <div style={S.bottomBar}>
        <button style={S.hintBtn} onClick={useHint} disabled={done}>
          💡 Підказка · {HINT_COST}
        </button>
      </div>

      {/* завершення рівня */}
      {done && (
        <div style={S.overlay}>
          <div style={S.overlayCard}>
            <div style={{ fontSize: 44 }}>✦</div>
            <h2 style={{ ...S.h2, margin: "8px 0" }}>Сузір'я складено!</h2>
            <p style={{ margin: "4px 0 16px", opacity: 0.8 }}>
              +20 {monet(20)} за рівень
              {bonusFound.length > 0 && ` · ${bonusFound.length} бонусних ${sliv(bonusFound.length)}`}
            </p>
            <button style={S.bigBtn} onClick={onNext}>
              {levelIdx < LEVELS.length - 1 ? "Наступний рівень →" : "У меню"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}
